name: Deploy to GCP
on:
    push:
        branches:
            - main
        
jobs:
    deploy-gcp:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                workload_identity_provider: 'projects/638495537867/locations/global/workloadIdentityPools/githubenv/providers/github-actions'
                service_account: 'codbridge@project-94e9628f-1e11-4518-969.iam.gserviceaccount.com:generateAccessToken'
        permissions:
          contents: read
          pages: write
          id-token: write