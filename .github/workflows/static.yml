name: Build Container

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3

    - uses: 'google-github-actions/auth@v2'
      id: auth
      with:
        token_format: access_token
        project_id: ${{secrets.GCP_PROJECT_ID }}
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_ID }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

    - uses: docker/login-action@v3
      with:
        registry: northamerica-northeast2-docker.pkg.dev
        username: oauth2accesstoken
        password: '${{ steps.auth.outputs.access_token }}'

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: windows-latest
        push: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
        tags: northamerica-northeast2-docker.pkg.dev/project-94e9628f-1e11-4518-969/gdockerimage
        cache-from: type=gha
        cache-to: type=gha,mode=max
